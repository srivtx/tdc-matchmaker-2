<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <style>
      .ink { fill: #1A1612; }
      .ink-soft { fill: #6B6356; }
      .ember { fill: #C84A2E; }
      .serif { font-family: 'Playfair Display', 'Didot', Georgia, 'Times New Roman', serif; font-weight: 400; }
      .mono  { font-family: 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace; font-weight: 500; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="200" fill="#FAF8F3"/>

  <!-- The T mark — elongated cap, asymmetric proportions,
       suggests two lives joining under one roof. -->
  <g transform="translate(48, 38)">
    <!-- Vertical stem (slightly tapered) -->
    <path d="M 38,0 L 50,0 L 52,124 L 36,124 Z" class="ember"/>
    <!-- Horizontal cap (asymmetric, longer on the right) -->
    <path d="M 0,0 L 88,0 L 88,12 L 52,12 L 50,0 L 38,0 L 36,12 L 0,12 Z" class="ember"/>
    <!-- A single hairline rule under the cap to suggest an underline / horizon -->
    <line x1="0" y1="20" x2="88" y2="20" stroke="#1A1612" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Wordmark — stacked, right of the mark -->
  <g transform="translate(168, 0)">
    <!-- TDC, the studio initials, in serif -->
    <text x="0" y="98" font-size="62" class="ink serif" letter-spacing="-1.5">TDC</text>

    <!-- A short ember rule between initials and descriptor -->
    <line x1="2" y1="116" x2="42" y2="116" stroke="#C84A2E" stroke-width="1.5"/>

    <!-- MATCHMAKER, the descriptor, in mono small caps -->
    <text x="2" y="138" font-size="11" class="ink-soft mono" letter-spacing="4.5">MATCHMAKER</text>
  </g>
</svg>
