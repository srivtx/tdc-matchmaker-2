<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" width="620" height="180">
  <!-- Warm beige background -->
  <rect width="620" height="180" rx="16" fill="#FAF8F3"/>

  <!-- Left: ember tile with serif T, vertically centered at y=90 -->
  <rect x="40" y="40" width="100" height="100" rx="16" fill="#C84A2E"/>
  <text x="90" y="108"
        font-size="72"
        font-weight="400"
        text-anchor="middle"
        fill="#F5F1E6"
        font-family="Georgia, 'Times New Roman', 'Playfair Display', serif"
        font-style="italic">T</text>

  <!-- Ember accent rule between tile and wordmark -->
  <line x1="160" y1="48" x2="160" y2="132" stroke="#C84A2E" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Right: wordmark block -->
  <text x="182" y="92"
        font-size="58"
        font-weight="400"
        letter-spacing="-1"
        fill="#1A1612"
        font-family="Georgia, 'Times New Roman', 'Playfair Display', serif">TDC</text>

  <text x="184" y="128"
        font-size="11"
        font-weight="500"
        letter-spacing="4"
        fill="#6B6356"
        font-family="'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace">MATCHMAKER · EST 2014</text>
</svg>
