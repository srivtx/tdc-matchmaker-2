<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" font-family="Georgia, 'Times New Roman', serif">
  <!-- Background — warm beige like the app's bg-elevated -->
  <rect width="600" height="200" fill="#FAF8F3"/>

  <!-- Left: ember tile with serif T -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="100" height="100" rx="14" fill="#C84A2E"/>
    <text x="50" y="78"
          font-size="76"
          font-weight="400"
          font-style="italic"
          text-anchor="middle"
          fill="#F5F1E6"
          font-family="Georgia, 'Times New Roman', serif">T</text>
  </g>

  <!-- Right: two-line wordmark -->
  <g transform="translate(170, 0)" fill="#1A1612">
    <text x="0" y="100"
          font-size="64"
          font-weight="400"
          letter-spacing="-1.5"
          font-family="Georgia, 'Times New Roman', serif">TDC</text>

    <text x="3" y="138"
          font-size="11"
          font-weight="500"
          letter-spacing="3.5"
          fill="#6B6356"
          font-family="'SF Mono', 'JetBrains Mono', Menlo, monospace">MATCHMAKER · EST 2014</text>
  </g>

  <!-- Subtle divider rule -->
  <line x1="170" y1="76" x2="170" y2="124" stroke="#C84A2E" stroke-width="1.5" opacity="0.55"/>
</svg>
